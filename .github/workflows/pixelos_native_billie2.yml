name: Native PixelOS 14 Build for Nord N100 (billie2)

on:
  workflow_dispatch:

jobs:
  build_rom:
    runs-on: ubuntu-latest

    steps:
      # STEP 1: Checkout repository configuration
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 2: Safe Disk Space Reclamation
      - name: Free Disk Space Safely
        run: |
          echo "=== Disk space before clearing ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "=== Disk space after clearing ==="
          df -h

      # STEP 3: Install Required Build Utilities
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib \
            gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzma \
            pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3-pip

      # STEP 4: Install Google Repo Tool Binary
      - name: Set up Google Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # STEP 5: Compiler Cache Management
      - name: Handle Compiler Cache (ccache)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-pixelos14-billie2-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-pixelos14-billie2-${{ github.ref_name }}-
            ccache-pixelos14-billie2-

      # STEP 6: Initialize and Sync Code Trees with Valid Billie2 Repositories
      - name: Initialize & Sync Source Code
        run: |
          git config --global user.name "Your Name"
          git config --global user.email "your.email@example.com"
          
          git config --global core.packedgitlimit 512m
          git config --global core.packedgitwindowsize 512m
          
          mkdir -p ~/android/pixelos
          cd ~/android/pixelos
          
          # Initialize Android 14 PixelOS branch structure
          ~/bin/repo init -u https://github.com/PixelOS-Fourteen/manifest.git -b fourteen-qpr1 --git-lfs --depth=1
          
          # Create local manifests folder structure
          mkdir -p .repo/local_manifests
          
          # FIXED DEVICE TREES: Using verified public repositories for billie2 (LineageOS/Themefox base)
          cat <<EOF > .repo/local_manifests/billie2_roomservice.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="LineageOS/android_device_oneplus_billie2" path="device/oneplus/billie2" remote="github" revision="lineage-21.0" />
            
            <project name="LineageOS/android_kernel_oneplus_sm4250" path="kernel/oneplus/sm4250" remote="github" revision="lineage-21.0" />
            
            <project name="TheMefox/android_vendor_oneplus_billie2" path="vendor/oneplus/billie2" remote="github" revision="fourteen" />
            
            <project name="PixelOS-Fourteen/hardware_oneplus" path="hardware/oneplus" remote="github" revision="fourteen" />
          </manifest>
          EOF
          
          echo "=== Manifest Injected Successfully ==="
          cat .repo/local_manifests/billie2_roomservice.xml
          
          # Multi-threaded sync routine with a single-thread fallback to repair missing toolchain links
          ~/bin/repo sync -c -j4 --force-sync --no-tags --no-clone-bundle --fail-fast || \
          ~/bin/repo sync -c -j1 --force-sync --no-tags --no-clone-bundle

      # STEP 7: Run Compilation Process
      - name: Execute Compilation
        run: |
          cd ~/android/pixelos
          
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          ccache -M 15G
          ccache -z
          
          source build/envsetup.sh
          lunch pixelos_billie2-userdebug
          
          mka bacon -j$(nproc --all)

      # STEP 8: Push Finished Zip Artifacts Back to Actions Panel
      - name: Upload Finished Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS_14_billie2_ROM
          path: ~/android/pixelos/out/target/product/billie2/*.zip
