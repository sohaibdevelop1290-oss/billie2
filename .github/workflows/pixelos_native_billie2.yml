name: Native PixelOS 14 Build for Nord N100 (billie2)

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build_rom:
    runs-on: ubuntu-latest

    steps:
      # STEP 1: Always checkout repository configurations first
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 2: Pure Storage Reclamation (No fallocate, No swap modifications)
      # This cleans up ~35GB-40GB of pre-installed bloat safely without breaking mount loops.
      - name: Free Disk Space Safely
        run: |
          echo "=== Disk space before clearing ==="
          df -h
          
          echo "Purging heavy runtime environments..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          
          echo "Pruning unused Docker cache images..."
          sudo docker image prune --all --force
          
          echo "=== Disk space after clearing ==="
          df -h

      # STEP 3: Install Core Linux packages required for Android Compilation
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib \
            gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzma \
            pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3-pip

      # STEP 4: Fetch Google Repo Binary tool
      - name: Set up Google Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # STEP 5: Re-link incremental compilation milestone cache blocks
      - name: Handle Compiler Cache (ccache)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-pixelos14-billie2-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-pixelos14-billie2-${{ github.ref_name }}-
            ccache-pixelos14-billie2-

      # STEP 6: Shallow-cloned checkout of PixelOS Android 14 Core Sources
      - name: Initialize & Sync Source Code
        run: |
          git config --global user.name "Your Name"
          git config --global user.email "your.email@example.com"
          
          # Force Git optimization limits to shield prebuilt nested checkouts from crashing
          git config --global core.packedgitlimit 512m
          git config --global core.packedgitwindowsize 512m
          
          mkdir -p ~/android/pixelos
          cd ~/android/pixelos
          
          # Initialize Android 14 (Fourteen) Manifest Source Target Tree
          ~/bin/repo init -u https://github.com/PixelOS-Fourteen/manifest.git -b fourteen-qpr1 --git-lfs --depth=1
          
          # Inject your specific local configuration manifest dependencies tree
          git clone https://github.com/sounddrill31/crave_aosp_builder.git -b main .repo/local_manifests
          
          # Double-pass sync pipeline to safely capture toolchain packages without stalling
          ~/bin/repo sync -c -j4 --force-sync --no-tags --no-clone-bundle --fail-fast || \
          ~/bin/repo sync -c -j1 --force-sync --no-tags --no-clone-bundle

      # STEP 7: Fire Up the Android Compilation Engine
      - name: Execute Compilation
        run: |
          cd ~/android/pixelos
          
          # Establish clear memory tracking boundaries for ccache
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          ccache -M 15G  # Securely restricts tracking log sizes under 15 Gigabytes
          ccache -z      # Refreshes internal statistics logs
          
          # Source compilation environmental variables
          source build/envsetup.sh
          
          # Initialize Nord N100 (billie2) build setup targets
          lunch pixelos_billie2-userdebug
          
          # Compile the ROM image package using maximum active core paths
          mka bacon -j$(nproc --all)

      # STEP 8: Upload flashable package files if build crosses 100% threshold
      - name: Upload Finished Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS_14_billie2_ROM
          path: ~/android/pixelos/out/target/product/billie2/*.zip
