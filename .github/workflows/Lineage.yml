name: Build LineageOS 22.1 for OnePlus Nord N100

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev lib32z1-dev python3 python-is-python3 openjdk-17-jdk libwxgtk3.2-dev

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Configure Git
        run: |
          git config --global user.email "build@github.com"
          git config --global user.name "GitHub Actions"

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-lineage-billie2-${{ github.sha }}
          restore-keys: ccache-lineage-billie2-

      - name: Configure ccache
        run: |
          ccache -M 5G
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_EXEC=$(which ccache)" >> $GITHUB_ENV

      - name: Create local manifest
        run: |
          mkdir -p ~/lineage/.repo/local_manifests
          echo '<?xml version="1.0" encoding="UTF-8"?><manifest><remove-project name="platform/prebuilts/clang/host/linux-x86" /></manifest>' > ~/lineage/.repo/local_manifests/remove_projects.xml

      - name: Sync LineageOS Source
        run: |
          mkdir -p ~/lineage
          cd ~/lineage
          repo init -u https://github.com/LineageOS/android.git -b lineage-22.1 --depth=1 --no-repo-verify
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags 2>&1 | tee sync.log || repo sync -c -j2 --force-sync --no-clone-bundle --no-tags 2>&1 | tee -a sync.log

      - name: Clone Device Trees
        run: |
          cd ~/lineage
          git clone https://github.com/sohaibdevelop1290-oss/android_device_oneplus_billie2.git device/oneplus/billie2 --depth=1 -b lineage-22.1
          git clone https://github.com/sohaibdevelop1290-oss/android_kernel_oneplus_sm4250.git kernel/oneplus/sm4250 --depth=1 -b lineage-22.1
          git clone https://github.com/sohaibdevelop1290-oss/proprietary_vendor_oneplus_billie2.git vendor/oneplus/billie2 --depth=1 -b lineage-22.1
          git clone https://github.com/LineageOS/android_hardware_oneplus.git hardware/oneplus --depth=1 -b lineage-22.1

      - name: Build LineageOS
        run: |
          cd ~/lineage
          source build/envsetup.sh
          breakfast billie2
          mka bacon -j$(nproc --all) 2>&1 | tee build.log

      - name: List Output Files
        if: always()
        run: |
          ls -la ~/lineage/out/target/product/billie2/ || echo "Directory not found"
          find ~/lineage/out/target/product/billie2/ -name "*.zip" 2>/dev/null || echo "No ZIP found"

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: LineageOS-22.1-billie2
          path: ~/lineage/out/target/product/billie2/*.zip
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ~/lineage/build.log
          retention-days: 3
