name: Build PixelOS for OnePlus Nord N100

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Check Disk Space
        run: df -h

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            imagemagick liblz4-tool libncurses-dev \
            libssl-dev libxml2 libxml2-utils lzop \
            pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev lib32z1-dev \
            python3 python-is-python3 openjdk-17-jdk \
            libwxgtk3.2-dev

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Configure Git
        run: |
          git config --global user.email "build@github.com"
          git config --global user.name "GitHub Actions"

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-pixelos-billie-${{ github.sha }}
          restore-keys: ccache-pixelos-billie-

      - name: Configure ccache
        run: |
          ccache -M 5G
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_EXEC=$(which ccache)" >> $GITHUB_ENV

      - name: Sync PixelOS Source
        run: |
          mkdir -p ~/pixelos
          cd ~/pixelos
          repo init \
            -u https://github.com/PixelOS-AOSP/manifest.git \
            -b fourteen \
            --depth=1 \
            --no-repo-verify
          repo sync -c \
            -j$(nproc --all) \
            --force-sync \
            --no-clone-bundle \
            --no-tags \
            --fail-fast \
            2>&1 | tee sync.log || \
          repo sync -c \
            -j2 \
            --force-sync \
            --no-clone-bundle \
            --no-tags \
            2>&1 | tee -a sync.log

      - name: Clone Device Trees
        run: |
          cd ~/pixelos

          git clone https://github.com/LineageOS/android_device_oneplus_billie \
            device/oneplus/billie --depth=1

          git clone https://github.com/LineageOS/android_device_oneplus_sm4250-common \
            device/oneplus/sm4250-common --depth=1

          git clone https://github.com/LineageOS/android_kernel_oneplus_sm4250 \
            kernel/oneplus/sm4250 --depth=1

          git clone https://github.com/TheMuppets/proprietary_vendor_oneplus_billie \
            vendor/oneplus/billie --depth=1

          git clone https://github.com/TheMuppets/proprietary_vendor_oneplus_sm4250-common \
            vendor/oneplus/sm4250-common --depth=1

      - name: Build PixelOS
        run: |
          cd ~/pixelos
          source build/envsetup.sh
          breakfast billie
          mka bacon -j$(nproc --all) 2>&1 | tee build.log

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-billie
          path: ~/pixelos/out/target/product/billie/PixelOS*.zip
          retention-days: 7

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            ~/pixelos/build.log
            ~/pixelos/sync.log
          retention-days: 3
